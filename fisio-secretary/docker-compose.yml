services:
  redis:
    image: redis:7-alpine
    container_name: fisio_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - fisio_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Postgres de desenvolvimento — banco isolado da produção (Supabase).
  # Usado com .env.development (npm run start:dev:local). Zero risco pra prod.
  postgres_dev:
    image: postgres:16-alpine
    container_name: fisio_postgres_dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: fisio
      POSTGRES_PASSWORD: fisio_dev
      POSTGRES_DB: fisio_dev
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - fisio_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fisio -d fisio_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis_data:
  postgres_dev_data:

networks:
  fisio_net:
    driver: bridge
