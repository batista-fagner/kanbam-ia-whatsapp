services:
  redis:
    image: redis:7-alpine
    container_name: fisio_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - fisio_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  evolution:
    container_name: evolution_api
    image: atendai/evolution-api:v2.3.7
    restart: always
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - evolution_instances:/evolution/instances
    networks:
      - fisio_net

volumes:
  redis_data:
  evolution_instances:

networks:
  fisio_net:
    driver: bridge
